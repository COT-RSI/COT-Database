name: Automatic Portfolio COT Update

on:
  schedule:
    - cron: '45 23 * * 5'
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install pandas requests

    - name: Run Matrix Engine
      run: python cot_updater.py

    - name: Push Master Database
      run: |
        git config --global user.name "Institutional Automation Bot"
        git config --global user.email "actions@github.com"
        git add cot_master_database.csv
        git diff-index --quiet HEAD || git commit -m "Automated Multi-Pair COT Matrix Sync [Skip CI]"
        git push
