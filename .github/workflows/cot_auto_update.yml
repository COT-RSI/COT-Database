name: Automatic Portfolio COT Update

on:
  schedule:
    - cron: '45 23 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install pandas requests

    - name: Run Matrix Engine
      run: python cot_updater.py

    - name: Push Master Database
      run: |
        git config --global user.name "Institutional Automation Bot"
        git config --global user.email "actions@github.com"
        
        # SMART CHECK: Agar file bani hai to use save karo, nahi to baseline file banao
        if [ -f cot_master_database.csv ]; then
          echo "Success: File found. Pushing updated database."
          git add cot_master_database.csv
          git diff-index --quiet HEAD || git commit -m "Automated Multi-Pair COT Matrix Sync [Skip CI]"
          git push
        else
          echo "WARNING: cot_master_database.csv was not created by the script."
          echo "Creating a baseline file to prevent workflow crash and generate Raw URL."
          echo "Date,Symbol,Long,Short,Net_Position" > cot_master_database.csv
          git add cot_master_database.csv
          git commit -m "Create initial baseline database file [Skip CI]"
          git push
        fi
